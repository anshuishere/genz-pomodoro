<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueFocus</title>
  <link rel="stylesheet" href="./popup/popup.css">
  <script type="module" crossorigin src="/popup.js"></script>
  <link rel="modulepreload" crossorigin href="/storage.0ZZBCB7d.js">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">TrueFocus</h1>
      <button id="settings-btn" class="icon-btn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l-.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Timer Display (NO RING - just text) -->
      <div class="timer-section">
        <div class="timer-display">
          <span id="timer-time" class="timer-time">25:00</span>
          <span id="timer-mode" class="timer-mode-label">Ready to Focus</span>
        </div>
        
        <!-- Status message for completion -->
        <div id="status-message" class="status-message" style="display: none;"></div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button id="action-btn" class="action-btn">
          Start Focus
        </button>
        <button id="skip-btn" class="skip-btn" style="display: none;">
          Skip
        </button>
      </div>

      <!-- Stats Section -->
      <div class="stats-section">
        <div class="stat">
          <span class="stat-label">Sessions today</span>
          <span id="session-count" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Total time</span>
          <span id="total-time" class="stat-value">0m</span>
        </div>
      </div>
    </main>

    <!-- Simplified Settings Modal -->
    <div id="settings-modal" class="modal" aria-hidden="true">
      <div class="modal-content">
        <header class="modal-header">
          <h2>Settings</h2>
          <button id="close-settings" class="icon-btn" aria-label="Close settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </header>
        
        <form id="settings-form" class="settings-form">
          <div class="setting-group">
            <label for="focus-duration">Focus Duration (minutes)</label>
            <input type="number" id="focus-duration" name="focusDuration" min="1" max="60" value="25">
          </div>
          
          <div class="setting-group">
            <label for="break-duration">Break Duration (minutes)</label>
            <input type="number" id="break-duration" name="breakDuration" min="1" max="30" value="5">
          </div>
          
          <div class="setting-group checkbox">
            <label>
              <input type="checkbox" name="notifications" checked>
              Enable notifications
            </label>
          </div>
          
          <div class="setting-group checkbox test-mode-toggle">
            <label>
              <input type="checkbox" name="testMode">
              <span class="test-mode-label">⚡ Test Mode (5s minimum)</span>
            </label>
          </div>
          
          <button type="submit" class="btn-primary">Save Settings</button>
        </form>
      </div>
    </div>
  </div>
  
</body>
</html>
