<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 380px;
      height: 520px;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b4e 100%);
      margin: 0;
      padding: 20px;
      color: white;
      font-family: sans-serif;
    }
    .timer-container {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      border: 2px solid red;
    }
    .timer-ring {
      position: relative;
      width: 240px;
      height: 240px;
      border: 2px solid yellow;
    }
    .timer-svg {
      width: 100%;
      height: 100%;
      border: 2px solid green;
    }
    .timer-bg {
      fill: none;
      stroke: rgba(255,255,255,0.2);
      stroke-width: 6;
    }
    .timer-progress {
      fill: none;
      stroke: #6366f1;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 691;
      stroke-dashoffset: 345;
    }
  </style>
</head>
<body>
  <h3>Debug: Timer Ring Test</h3>
  <p>If you see a blue ring below, the SVG is working.</p>
  
  <div class="timer-container">
    <div class="timer-ring">
      <svg class="timer-svg" viewBox="0 0 240 240">
        <circle class="timer-bg" cx="120" cy="120" r="110"/>
        <circle class="timer-progress" cx="120" cy="120" r="110"/>
      </svg>
    </div>
  </div>
  
  <p>Red border = container, Yellow = ring div, Green = SVG</p>
  <p>You should see a partial blue ring (50% progress).</p>
</body>
</html>
